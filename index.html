<!doctype html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- External CSS -->
     <link rel="stylesheet" href="style.css">

    <!-- DaisyUI & Tailwind CSS -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Geist Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Hind+Siliguri:wght@300;400;500;600;700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

</head>
<body class="flex items-center justify-center min-h-screen bg-[#F8FAFC]">
    <div class="fieldset bg-white border-base-300 rounded-xl w-11/12 sm:w-8/12 md:w-6/12 lg:w-4/12 border p-6 sm:p-8 mx-auto min-h-max shadow-sm">
        <div class="flex justify-center items-center flex-col">
            <img src="./assets/github-logo.png" alt="GitHubLogo">
            <h2 class="font-bold text-2xl sm:text-3xl md:text-4xl mt-4">GitHub Issues Tracker</h2>
            <h3 class="text-base sm:text-lg md:text-xl">Sign in to manage your issues</h3>
        </div>
        

        <label class="label text-black font-bold">Username</label>
        <input type="text" class="input w-full sm:w-full md:w-full" placeholder="Enter Username" id="username" />
        <span class="text-[#4A00FF]">Default: admin</span>

        <br>

        <label class="label text-black font-bold">Password</label>
        <input type="password" class="input w-full sm:w-full md:w-full" placeholder="Enter Password" id="password" />
        <span class="text-[#4A00FF]">Default: admin123</span>

        <button class="btn btn-primary mt-4" id="loginbtn">Login</button>

        <div class="divider">OR</div>

        <div class="flex flex-col items-center justify-center">
            <h2 class="text-gray-500 text-xl font-bold">Demo Credentials:</h2>
            <br>
            <br>
            <p><span class="font-bold">Username:</span> admin</p>
            <p><span class="font-bold">Password:</span> admin123</p>
        </div>        
    </div>


    <script src="./script/login.js"></script>
</body>
</html>
